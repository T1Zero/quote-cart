# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "b62160b04b2ee1266c1d09c7f5cfc3d6"
name = "quote-cart"
application_url = "https://quote-cart-extension-production.up.railway.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# write_draft_orders + read/write_customers needed to convert quotes into Shopify draft orders.
scopes = "read_products,write_products,write_draft_orders,read_customers,write_customers"

[auth]
redirect_urls = [
  "https://quote-cart-extension-production.up.railway.app/auth/callback",
  "https://quote-cart-extension-production.up.railway.app/auth/shopify/callback",
  "https://quote-cart-extension-production.up.railway.app/api/auth/callback"
]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

# App Proxy: storefront /apps/quote -> our Remix routes /apps/quote and /apps/quote/submit.
[app_proxy]
url = "https://quote-cart-extension-production.up.railway.app/apps/quote"
prefix = "apps"
subpath = "quote"

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true